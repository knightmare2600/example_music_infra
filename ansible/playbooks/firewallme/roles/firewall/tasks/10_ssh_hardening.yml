---
# =============================================================================
# roles/firewall/tasks/10_ssh_hardening.yml
# Example Music Limited вҖ” SSH hardening and banner
# =============================================================================
# Mirrors firewallme.sh SSH section: sshd_config hardening, banner,
# ansible user authorized_keys.
# Changelog:
#   2026-06-20  Initial file
#   2026-06-29  Replace static /etc/motd with dynamic MOTD via PAM update-motd.d;
#               add /etc/update-motd.d/10-examplemusic (ASCII art, network table,
#               live WireGuard peer handshake status, system stats) and
#               /etc/profile.d/motd.sh for console logins
# =============================================================================

- name: "[SSH] Write ansible user authorized_keys"
  ansible.posix.authorized_key:
    user:  ansible
    key:   "{{ exa_ansible_pub_key }}"
    state: present
    exclusive: true

- name: "[SSH] Harden /etc/ssh/sshd_config"
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} EXAMPLE MUSIC ANSIBLE MANAGED"
    block: |
      # Example Music Limited вҖ” {{ inventory_hostname }}
      PermitRootLogin              no
      PasswordAuthentication       no
      ChallengeResponseAuthentication no
      PubkeyAuthentication         yes
      AuthorizedKeysFile           .ssh/authorized_keys
      PermitEmptyPasswords         no
      X11Forwarding                no
      PrintMotd                    no
      PrintLastLog                 yes
      UsePAM                       yes
      AllowUsers                   ansible
      MaxAuthTries                 3
      LoginGraceTime               30
      ClientAliveInterval          300
      ClientAliveCountMax          2
      TCPKeepAlive                 yes
      UseDNS                       no
      # Restrict ciphers/MACs (disable weak legacy)
      Ciphers     chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
      MACs        hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
      KexAlgorithms curve25519-sha256,diffie-hellman-group14-sha256
  notify: reload ssh

- name: "[SSH] Write /etc/issue (pre-login banner)"
  ansible.builtin.copy:
    dest: /etc/issue
    mode: '0644'
    content: |

      в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—
      в•‘   EXAMPLE MUSIC LIMITED вҖ” AUTHORISED ACCESS ONLY                в•‘
      в•‘                                                                  в•‘
      в•‘   Host        : {{ inventory_hostname }}                         в•‘
      в•‘   Site        : {{ fw_site_code }}                               в•‘
      в•‘   Environment : {{ fw_environment }}                             в•‘
      в•‘                                                                  в•‘
      в•‘   Unauthorised access to this system is a criminal offence.     в•‘
      в•‘   All connections are logged and monitored.                     в•‘
      в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ

- name: "[SSH] Write /etc/issue.net (SSH pre-auth banner)"
  ansible.builtin.copy:
    dest: /etc/issue.net
    mode: '0644'
    src: /etc/issue
  delegate_to: "{{ inventory_hostname }}"

- name: "[SSH] Enable SSH banner in sshd_config"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Banner'
    line: 'Banner /etc/issue.net'
  notify: reload ssh

- name: "[SSH] Clear /etc/motd (dynamic MOTD via PAM update-motd.d replaces static banner)"
  ansible.builtin.copy:
    dest: /etc/motd
    mode: '0644'
    content: ""

- name: "[SSH] Disable existing update-motd.d scripts"
  ansible.builtin.shell: chmod -x /etc/update-motd.d/* 2>/dev/null || true
  changed_when: false

- name: "[SSH] Write dynamic MOTD script"
  ansible.builtin.copy:
    dest: /etc/update-motd.d/10-examplemusic
    mode: '0755'
    content: |
      #!/bin/bash
      GR='\033[0;32m'; CY='\033[0;36m'; RD='\033[0;31m'; YL='\033[0;33m'
      OR='\033[38;5;208m'; WH='\033[1;37m'; NC='\033[0m'

      SITE="unknown"; WG_ROLE="none"; ENTITY=""; CITY=""; COUNTRY=""
      if [[ -f /etc/example-music/nodeinfo.json ]] && command -v jq &>/dev/null; then
        SITE=$(   jq -r '.site    // "unknown"' /etc/example-music/nodeinfo.json)
        WG_ROLE=$(jq -r '.wg_role // "none"'   /etc/example-music/nodeinfo.json)
        ENTITY=$( jq -r '.entity  // ""'       /etc/example-music/nodeinfo.json)
        CITY=$(   jq -r '.city    // ""'       /etc/example-music/nodeinfo.json)
        COUNTRY=$(jq -r '.country // ""'       /etc/example-music/nodeinfo.json)
      fi

      WAN_INFO=""; LAN_INFO=""; WG_INFO=""; OTHER_INFO=""
      while IFS= read -r iface; do
        IP=$(ip -4 addr show "$iface" 2>/dev/null | awk '/inet /{print $2}' | head -1)
        [[ -z "$IP" ]] && IP="no IP"
        case "$iface" in
          wg*)  WG_INFO="${WG_INFO}    ${OR}WireGuard ${iface}${NC} : ${OR}${IP}${NC}\n" ;;
          lo)   continue ;;
          *)
            if ip route show dev "$iface" 2>/dev/null | grep -q "^default"; then
              WAN_INFO="${WAN_INFO}    ${RD}WAN  ${iface}${NC} : ${RD}${IP}${NC}\n"
            elif [[ -n "$IP" ]]; then
              LAN_INFO="${LAN_INFO}    ${GR}LAN  ${iface}${NC} : ${GR}${IP}${NC}\n"
            fi
            ;;
        esac
      done < <(ip -o link show | awk -F': ' '{print $2}' | grep -v '@')

      WG_PEERS=""
      if command -v wg &>/dev/null && ip link show wg0 &>/dev/null 2>&1; then
        WG_PEERS="  ${WH}в”Җв”Җ WireGuard Peers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ${NC}\n"
        PEER_COUNT=0; ACTIVE_COUNT=0; NOW=$(date +%s)
        while IFS=$'\t' read -r PUBKEY PRESHARED ENDPOINT ALLOWED HANDSHAKE TX RX KEEPALIVE; do
          PEER_COUNT=$((PEER_COUNT + 1))
          PEER_NAME=$(awk -v pk="$PUBKEY" '
            /^#/ { comment = substr($0, 3) }
            /PublicKey/ && $3 == pk { print comment; exit }
          ' /etc/wireguard/wg0.conf 2>/dev/null)
          PEER_NAME="${PEER_NAME:-???}"
          EP_IP="${ENDPOINT%%:*}"
          [[ "$EP_IP" == "(none)" ]] && EP_IP="no endpoint"
          ALLOWED_DISP=$(echo "$ALLOWED" | cut -d',' -f1 | xargs)
          if [[ "$HANDSHAKE" == "0" ]]; then
            HS_STR="${RD}never${NC}"; STATUS="${RD}вң—${NC}"
          else
            AGE=$((NOW - HANDSHAKE))
            if [[ $AGE -lt 60 ]]; then HS_STR="${GR}${AGE}s ago${NC}"
            elif [[ $AGE -lt 3600 ]]; then HS_STR="${GR}$((AGE/60))m ago${NC}"
            elif [[ $AGE -lt 86400 ]]; then HS_STR="${YL}$((AGE/3600))h ago${NC}"
            else HS_STR="${RD}$((AGE/86400))d ago${NC}"; fi
            if [[ $AGE -lt 180 ]]; then STATUS="${GR}вң“${NC}"; ACTIVE_COUNT=$((ACTIVE_COUNT + 1))
            else STATUS="${YL}~${NC}"; ACTIVE_COUNT=$((ACTIVE_COUNT + 1)); fi
          fi
          fmt_bytes() {
            local b=$1
            if [[ $b -ge 1073741824 ]]; then printf "%.1fG" "$(echo "scale=1; $b/1073741824" | bc)"
            elif [[ $b -ge 1048576 ]];   then printf "%.1fM" "$(echo "scale=1; $b/1048576"   | bc)"
            elif [[ $b -ge 1024 ]];      then printf "%.1fK" "$(echo "scale=1; $b/1024"      | bc)"
            else printf "${b}B"; fi
          }
          TX_STR=$(fmt_bytes "$TX"); RX_STR=$(fmt_bytes "$RX")
          WG_PEERS="${WG_PEERS}    ${STATUS} ${CY}$(printf '%-12s' "$PEER_NAME")${NC}"
          WG_PEERS="${WG_PEERS} ${GR}$(printf '%-18s' "$ALLOWED_DISP")${NC}"
          WG_PEERS="${WG_PEERS} ${WH}$(printf '%-18s' "$EP_IP")${NC}"
          WG_PEERS="${WG_PEERS} ${HS_STR}  ${YL}вҶ‘${TX_STR} вҶ“${RX_STR}${NC}\n"
        done < <(wg show wg0 dump 2>/dev/null | tail -n +2)
        WG_PEERS="${WG_PEERS}    ${CY}Total${NC}: ${GR}${ACTIVE_COUNT}${NC} active of ${PEER_COUNT} configured\n"
      fi

      UPTIME=$(uptime -p 2>/dev/null | sed 's/up //')
      LOAD=$(cut -d' ' -f1-3 /proc/loadavg)
      MEM_TOTAL=$(free -m | awk '/^Mem/{print $2}')
      MEM_USED=$(free -m  | awk '/^Mem/{print $3}')
      DISK=$(df -h / | awk 'NR==2{print $3 " used of " $2 " (" $5 ")"}')

      echo -e "
      ${GR}в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЈ в Өв ӨвЈ„в Җв Җв Җв Җ
      в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈ в һв үвўҖвЈҖвЈҖвЈҝвЈ§в Җв Җв Җ
      в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҖв Җв Җв Җв Җв Җв Җв Җв Җвў°вЈҫв ҒвЈ в –в үвўҖвЈҖвЈ§вЈҲвЈ§в Җв Җ
      в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЈҖвЈҖвЈҖвЈ·вЈ„в Җв Җв Җв Җв Җв ҖвЈ вўҫв ӣвЈҝвЎҒвЈ в һв үвўҖвЈҜвЈҖвЈҲвЈҮв Җ
      в Җв Җв Җв Җв ҖвўҖвЈјвЈҝвЈҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎ в һв үв ҖвЈҖвЈҳвЈҸв ӣвЈ·вўӨвЈҖвЈҖвЎӨв һв ҒвЈёв ҹв ҖвЎ·в ғвЈ вЈ¶вЈҹвЈҸвЈҖвЈҖвЈҳвЈҶ
      в Җв Җв Җв Җв ҖвЈҫвЎҝв ӣвў»вЎҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвў в һв ҖвЈ в –в үв үв үвЈҸв ҷвЎҝвўҫвЈ„вЈҖвЈҖвЈ вЈјвЈҪвЈ в һв ҖвЎ°в ғвўЁв ҹв Ӣв Җв Җв Җв ү
      в Җв Җв Җв Җвў°вЈҝв Җв ҖвўёвЎҮв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЎҸвў в һв ҒвЈ вЈҙвЈҫвЈҝв Ҹв үв “вўҫвЈҰвЈҖвЎҖвў»вЎҝв ҹв ҒвўҖв һв ҒвЎҙв ғв Җв Җв Җв Җв Җв Җ
      в Җв Җв Җв Җв ёвЎҮв ҖвўҖвЈҫв Үв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўёвЈҶв ҖвЎёвўҖв Ҹвў в һв ҒвЈЁв ҹв Ӣв үв үв үвў»вЎ§вўӨвЈҲвЈҒвЈҖвЈ в –в ӢвўҖвЎһв Ғв Җв Җв Җв Җв Җв Җв Җ
      в Җв Җв Җв Җв ҖвЈҝвЈӨвЈҝвЎҹв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җвўёв ӣвўівЎҮвЎёвў в Ҹвў в һв ҒвЈ в ”в Ҡв үв үвў»в —в ҰвЈ„вЈҖв ҖвўҖвЈ в ”в Ӣв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      в Җв Җв Җв ҖвЈ вЈҫвЈҝвЈҝв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвў вЈҖвЈҖвЈӨв Җв Җв Җв Җв Җв ҖвўёвЈҖвЎһвЈ·в ҮвЎңвў в ҸвўҖвЎһв Ғв Җв ҖвЈ°вўһвЈ»в Үв Җв Җв Җв үв Ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      в Җв ҖвЈ вЈҫвЈҝвЎҝвЈҸв Җв Җв Җв Җв Җв Җв Җв Җв Җвў вЎҗв Ұв ӨвўӨвЎҲвЈ»вўҝвЎ–в Ұв ӨвЈҖвЈ вЈҙв ҸвўҳвЎҹвўҖв ғвЎңвў в Ҹв Җв Җв Җв Җв ӣв ӣв Ӣв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      в ҖвЈҙвЈҝвЎҝв Ӣв Җвў»вЎүв Җв Җв Җв Җв Җв Җв Җв Җв ‘в ’в ўв „вўӨвЈҖвЈҸв ҷвў»в Ів ӨвўҝвЈҝвЈӢв Өв ҠвўҖвЈҫвЈ в ғвЎңв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      вў°вЈҝвЎҹв ҖвўҖвЈҙвЈҝвЈҝвЈҝвЈҝвЈҰв Җв Җв Җв Җв Җв ’в ’в Ів ӨвЈӨвЎҖвЈҜвЈүв ӣв ’в Ұв ӨвЈҖвЈҖвЈҖвЎӨв ҡвў№вЈҝвЈ°в ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      вўёвЎҝв Җв ҖвЈҝв ҹв ӣвЈҝв ҹв ӣвЈҝвЈ§в Җв Җв Җв җв җв ’в ’в °вЈ№в ·вЈҜвЈҲвЎүв ‘в ’в Ұв ӨвЈҖвЈҖвЈҖвЎӨвўҝвўҖвЈҝвЎ„в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      в ҳвЈҝвЎҖв ҖвўҝвЎҖв Җвў»вЈӨв –вў»вЎҝв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв үв үв “в Ів Өвў„вЈҖвЈҖвЈҖвЈјв ҹвЈёв ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      в Җв ҳвў·вЈ„в Ҳв ҷв Ұв ёвЎҮвўҖвЎҫв ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈҫвЈҝвЎҝв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
      в Җв Җв Җв ҷв ӣв ¶в Өв ¶вЈҝв үв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв үв Ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ
