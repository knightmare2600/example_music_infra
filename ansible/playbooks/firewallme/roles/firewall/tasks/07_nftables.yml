---
# =============================================================================
# roles/firewall/tasks/07_nftables.yml
# Example Music Limited — nftables ruleset
# =============================================================================
# Mirrors firewallme.sh nftables block: table inet filter + table ip nat,
# WireGuard port hole (hubs/spokes), WAN SSH optional, LAN SSH always,
# Ansible IP allow, Cockpit, Zabbix agent, dnsmasq, DHCP.
# Changelog:
#   2026-06-20  Initial file
# =============================================================================

- name: "[nftables] Write /etc/nftables.conf"
  ansible.builtin.copy:
    dest: /etc/nftables.conf
    mode: '0640'
    content: |
      #!/usr/sbin/nft -f
      # ==========================================================================
      # /etc/nftables.conf
      # Example Music Limited — {{ inventory_hostname }}
      # Site: {{ fw_site_code }}  Environment: {{ fw_environment }}
      # Generated by Ansible firewall role — {{ ansible_date_time.iso8601 }}
      # ==========================================================================

      flush ruleset

      # --------------------------------------------------------------------------
      # NAT — masquerade LAN → WAN
      # --------------------------------------------------------------------------
      table ip nat {
        chain postrouting {
          type nat hook postrouting priority srcnat; policy accept;
          oifname "{{ fw_wan_iface }}" masquerade
        }
      }

      # --------------------------------------------------------------------------
      # Filter — input, forward, output
      # --------------------------------------------------------------------------
      table inet filter {

        # ------------------------------------------------------------------
        # Inbound to the firewall itself
        # ------------------------------------------------------------------
        chain input {
          type filter hook input priority filter; policy drop;

          # Established / related always allowed
          ct state { established, related } accept

          # Drop invalid packets early
          ct state invalid drop

          # Loopback
          iifname "lo" accept

          # ICMP
          ip  protocol icmp  accept
          ip6 nexthdr  icmpv6 accept

          # ── LAN inbound ───────────────────────────────────────────────
          iifname "{{ fw_lan_iface }}" {

            # DHCP
            udp dport 67 accept  comment "DHCP server"

            # DNS
            tcp dport 53 accept  comment "DNS (dnsmasq)"
            udp dport 53 accept  comment "DNS (dnsmasq)"

            # SSH — always on LAN
            tcp dport 22 accept  comment "SSH LAN"

            # Cockpit
            tcp dport 9090 accept  comment "Cockpit (LAN only)"

            # Zabbix agent
            tcp dport { 10050, 10051 } accept  comment "Zabbix agent LAN"
          }

          # ── WAN inbound ───────────────────────────────────────────────
          iifname "{{ fw_wan_iface }}" {
      {% if fw_wan_ssh_enabled %}
      {% if fw_wan_ssh_src %}
            # SSH WAN — restricted to source IP
            ip saddr {{ fw_wan_ssh_src }} tcp dport 22 accept  comment "SSH WAN restricted"
      {% else %}
            # SSH WAN — open (review this!)
            tcp dport 22 accept  comment "SSH WAN open"
      {% endif %}
      {% endif %}

      {% if fw_wg_role in ['hub-primary', 'hub-regional'] %}
            # WireGuard — hub listens on {{ fw_wg_port }}
            udp dport {{ fw_wg_port }} accept  comment "WireGuard hub listen"
      {% elif fw_wg_role == 'spoke' %}
            # WireGuard — spoke return traffic
            udp dport {{ fw_wg_port | default(51820) }} accept  comment "WireGuard spoke"
      {% endif %}

            # Zabbix proxy — CLD only
      {% if fw_site_code == 'CLD' %}
            tcp dport 10051 accept  comment "Zabbix proxy inbound (CLD)"
      {% endif %}
          }

          # ── WireGuard interface inbound ───────────────────────────────
      {% if fw_wg_role != 'none' and not fw_is_black_site %}
          iifname "wg0" {
            # WireGuard tunnel — allow management protocols
            tcp dport 22 accept    comment "SSH over WG tunnel"
            tcp dport 9090 accept  comment "Cockpit over WG tunnel"
            tcp dport { 10050, 10051 } accept  comment "Zabbix over WG"
            icmp type echo-request accept
          }
      {% endif %}

          # Reject everything else with a polite message
          reject with icmpx type port-unreachable
        }

        # ------------------------------------------------------------------
        # Forward — LAN → WAN, WG tunnel routing
        # ------------------------------------------------------------------
        chain forward {
          type filter hook forward priority filter; policy drop;

          ct state { established, related } accept
          ct state invalid drop

          # LAN → WAN
          iifname "{{ fw_lan_iface }}" oifname "{{ fw_wan_iface }}" accept

          # WAN → LAN (return traffic)
          iifname "{{ fw_wan_iface }}" oifname "{{ fw_lan_iface }}" ct state { established, related } accept

      {% if fw_wg_role != 'none' and not fw_is_black_site %}
          # WireGuard ↔ LAN
          iifname "wg0" oifname "{{ fw_lan_iface }}" accept
          iifname "{{ fw_lan_iface }}" oifname "wg0" accept

          # WireGuard ↔ WAN (hub re-routing between spokes)
          iifname "wg0" oifname "{{ fw_wan_iface }}" accept
          iifname "{{ fw_wan_iface }}" oifname "wg0" ct state { established, related } accept
      {% endif %}

      {% if fw_site_code == 'CLD' %}
          # CLD provisioning → all site subnets (bootstrapping)
          iifname "{{ fw_lan_iface }}" ip daddr 192.168.0.0/16 accept
          iifname "{{ fw_wan_iface }}" ip daddr 192.168.0.0/16 accept
      {% endif %}
        }

        # ------------------------------------------------------------------
        # Output — permissive (firewall-originated traffic)
        # ------------------------------------------------------------------
        chain output {
          type filter hook output priority filter; policy accept;
        }

      }
  notify: reload nftables

- name: "[nftables] Enable nftables service"
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

- name: "[nftables] Flush handlers (load ruleset now)"
  ansible.builtin.meta: flush_handlers

- name: "[nftables] Verify ruleset loaded"
  ansible.builtin.shell: nft list ruleset | wc -l
  register: nft_line_count
  changed_when: false

- name: "[nftables] Show ruleset size"
  ansible.builtin.debug:
    msg: "nftables ruleset loaded — {{ nft_line_count.stdout | trim }} lines"
