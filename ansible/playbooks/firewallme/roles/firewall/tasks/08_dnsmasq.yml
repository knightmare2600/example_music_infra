---
# =============================================================================
# roles/firewall/tasks/08_dnsmasq.yml
# Example Music Limited — dnsmasq configuration
# =============================================================================
# Mirrors firewallme.sh dnsmasq block: DHCP pool, DNS forwarder,
# internal DNS upstream if set, DHCP static leases from inventory.
# Changelog:
#   2026-06-20  Initial file
# =============================================================================

- name: "[dnsmasq] Disable systemd-resolved (conflicts with dnsmasq on port 53)"
  ansible.builtin.systemd:
    name: systemd-resolved
    enabled: false
    state: stopped
  failed_when: false

- name: "[dnsmasq] Remove systemd-resolved stub"
  ansible.builtin.file:
    path: /etc/resolv.conf
    state: absent

- name: "[dnsmasq] Write /etc/resolv.conf (point to dnsmasq)"
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    mode: '0644'
    content: |
      # Example Music Limited — {{ inventory_hostname }}
      # Written by Ansible firewall role
      nameserver 127.0.0.1
      search {{ fw_site_code | lower }}.jukebox.internal jukebox.internal
    attributes: "+i"   # immutable — prevent NM overwriting

- name: "[dnsmasq] Write /etc/dnsmasq.d/exa-firewall.conf"
  ansible.builtin.copy:
    dest: /etc/dnsmasq.d/exa-firewall.conf
    mode: '0644'
    content: |
      # ==========================================================================
      # dnsmasq — Example Music Limited — {{ inventory_hostname }}
      # Site: {{ fw_site_code }}  Generated by Ansible firewall role
      # ==========================================================================

      # --- Interface binding ---
      interface={{ fw_lan_iface }}
      except-interface={{ fw_wan_iface }}
      bind-interfaces
      listen-address=127.0.0.1
      listen-address={{ fw_lan_ip }}

      # --- DNS ---
      domain={{ fw_site_code | lower }}.jukebox.internal
      local=/{{ fw_site_code | lower }}.jukebox.internal/
      expand-hosts

      # Upstream DNS — site DC first, then central BIND9
      server={{ fw_dc_dns }}
      server={{ fw_cld_dns }}

      # DNSSEC
      dnssec
      trust-anchor=.,20326,8,2,E06D44B80B8F1D39A95C0B0D7C65D08458E880409BBC683457104237C7F8EC8D

      # --- DHCP ---
      dhcp-range={{ fw_dhcp_start }},{{ fw_dhcp_end }},12h
      dhcp-option=option:router,{{ fw_lan_ip }}
      dhcp-option=option:dns-server,{{ fw_dc_dns }},{{ fw_cld_dns }}
      dhcp-option=option:domain-name,{{ fw_site_code | lower }}.jukebox.internal

      # Authoritative — reply NACK to unknown leases
      dhcp-authoritative

      # DHCP lease file
      dhcp-leasefile=/var/lib/misc/dnsmasq.leases

      # DHCP dynamic hostname registration in BIND zone convention
      # dhcp01.<site>.jukebox.internal → 192.168.<octet>.100
      dhcp-generate-names=tag:{{ fw_site_code | lower }},dhcp%s.{{ fw_site_code | lower }}

      # --- Static DHCP leases from inventory ---
      # EXA convention: .1=FWL .2-.4=BMC .5-.7=PVE .10=DC .11=DC2 .48=SBC/PBX .253=FWL2
      dhcp-host={{ fw_wan_mac }},{{ fw_wan_iface }},{{ fw_lan_ip | replace('.1', '.1') }}  # self WAN
      dhcp-host={{ fw_lan_mac }},{{ fw_lan_iface }},{{ fw_lan_ip }}  # self LAN

      # Ansible control node
      # dhcp-host=<ansible-mac>,EXAANSCLD001,{{ fw_ansible_ip }}

      # --- TFTP / PXE (CLD provisioning network only) ---
      {% if fw_site_code == 'CLD' %}
      enable-tftp
      tftp-root=/srv/tftp
      dhcp-boot=pxelinux.0
      {% endif %}

      # --- Logging ---
      log-queries
      log-facility=/var/log/dnsmasq.log
      log-dhcp
  notify: restart dnsmasq

- name: "[dnsmasq] Create lease file directory"
  ansible.builtin.file:
    path: /var/lib/misc
    state: directory
    mode: '0755'

- name: "[dnsmasq] Create /var/log/dnsmasq.log"
  ansible.builtin.file:
    path: /var/log/dnsmasq.log
    state: touch
    mode: '0640'
    modification_time: preserve
    access_time: preserve

- name: "[dnsmasq] Write logrotate config for dnsmasq"
  ansible.builtin.copy:
    dest: /etc/logrotate.d/dnsmasq
    mode: '0644'
    content: |
      /var/log/dnsmasq.log {
        daily
        rotate 7
        compress
        missingok
        notifempty
        postrotate
          systemctl restart dnsmasq >/dev/null 2>&1 || true
        endscript
      }

- name: "[dnsmasq] Enable and start dnsmasq"
  ansible.builtin.systemd:
    name: dnsmasq
    enabled: true
    state: started

- name: "[dnsmasq] Flush handlers"
  ansible.builtin.meta: flush_handlers

- name: "[dnsmasq] Verify dnsmasq is listening on LAN"
  ansible.builtin.shell: "ss -ulnp | grep ':53'"
  register: dnsmasq_listen
  changed_when: false

- name: "[dnsmasq] Show listening sockets"
  ansible.builtin.debug:
    msg: "{{ dnsmasq_listen.stdout_lines }}"
