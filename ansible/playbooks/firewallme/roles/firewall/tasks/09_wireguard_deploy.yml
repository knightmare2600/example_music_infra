---
# =============================================================================
# roles/firewall/tasks/09_wireguard_deploy.yml
# Example Music Limited — WireGuard key generation and wg0.conf deployment
# =============================================================================
# Mirrors firewallme.sh WG section: generate keypair (preserve if exists),
# write /etc/wireguard/wg0.conf, enable wg-quick@wg0.
# Skipped for CLD (fw_is_black_site) and fw_wg_role == 'none'.
# Changelog:
#   2026-06-20  Initial file
#   2026-06-29  Add wg-quick@wg0 network-online.target drop-in (bug fix: shipped
#               unit only has After=network.target which fires before any interface
#               has an IP, causing endpoint resolution failures at boot)
# =============================================================================

- name: "[WireGuard] Skip — not applicable (role=none or black site)"
  ansible.builtin.debug:
    msg: "WireGuard role is '{{ fw_wg_role }}' — skipping WG deployment."
  when: fw_wg_role == 'none' or fw_is_black_site

# ── Key generation (preserve if already exists) ───────────────────────────────

- name: "[WireGuard] Check for existing private key"
  ansible.builtin.stat:
    path: /etc/wireguard/private.key
  register: wg_privkey_existing
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Generate private key (new install)"
  ansible.builtin.shell: |
    install -m 0700 -d /etc/wireguard
    wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key
    chmod 0600 /etc/wireguard/private.key
    chmod 0644 /etc/wireguard/public.key
  when:
    - fw_wg_role != 'none'
    - not fw_is_black_site
    - not wg_privkey_existing.stat.exists

- name: "[WireGuard] Read private key"
  ansible.builtin.slurp:
    src: /etc/wireguard/private.key
  register: wg_privkey_b64
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Read public key"
  ansible.builtin.slurp:
    src: /etc/wireguard/public.key
  register: wg_pubkey_b64
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Set key facts"
  ansible.builtin.set_fact:
    fw_wg_privkey: "{{ wg_privkey_b64.content | b64decode | trim }}"
    fw_wg_pubkey:  "{{ wg_pubkey_b64.content | b64decode | trim }}"
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Display public key (needed for hub peer registration)"
  ansible.builtin.debug:
    msg:
      - "Public key for {{ inventory_hostname }}:"
      - "{{ fw_wg_pubkey }}"
      - ""
      - "Register this as a peer on {{ fw_wg_hub_site | default('the hub') }}"
      - "  wg set wg0 peer {{ fw_wg_pubkey }} allowed-ips {{ fw_wg_tunnel_ip }}/32,{{ fw_subnet }}.0/24"
  when: fw_wg_role != 'none' and not fw_is_black_site

# ── Generate preshared key ────────────────────────────────────────────────────

- name: "[WireGuard] Check for existing preshared key"
  ansible.builtin.stat:
    path: /etc/wireguard/preshared.key
  register: wg_psk_existing
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Generate preshared key"
  ansible.builtin.shell: |
    wg genpsk > /etc/wireguard/preshared.key
    chmod 0600 /etc/wireguard/preshared.key
  when:
    - fw_wg_role != 'none'
    - not fw_is_black_site
    - not wg_psk_existing.stat.exists

- name: "[WireGuard] Read preshared key"
  ansible.builtin.slurp:
    src: /etc/wireguard/preshared.key
  register: wg_psk_b64
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Set PSK fact"
  ansible.builtin.set_fact:
    fw_wg_psk: "{{ wg_psk_b64.content | b64decode | trim }}"
  when: fw_wg_role != 'none' and not fw_is_black_site

# ── Write wg0.conf — spoke ────────────────────────────────────────────────────

- name: "[WireGuard] Write wg0.conf (spoke)"
  ansible.builtin.copy:
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
    content: |
      # ==========================================================================
      # /etc/wireguard/wg0.conf
      # Example Music Limited — {{ inventory_hostname }} (spoke)
      # Site: {{ fw_site_code }}  Hub: {{ fw_wg_hub_site }}
      # Generated by Ansible firewall role — {{ ansible_date_time.iso8601 }}
      # ==========================================================================

      [Interface]
      PrivateKey = {{ fw_wg_privkey }}
      Address    = {{ fw_wg_tunnel_ip }}/24
      DNS        = {{ fw_lan_ip }}

      PostUp   = nft add rule inet filter forward iifname "wg0" accept
      PostUp   = nft add rule inet filter forward oifname "wg0" accept
      PreDown  = nft delete rule inet filter forward iifname "wg0" accept
      PreDown  = nft delete rule inet filter forward oifname "wg0" accept

      [Peer]
      # {{ fw_wg_hub_site }} hub — {{ fw_wg_hub_endpoint }}
      PublicKey    = {{ fw_wg_hub_pubkey }}
      PresharedKey = {{ fw_wg_psk }}
      Endpoint     = {{ fw_wg_hub_endpoint }}
      AllowedIPs   = {{ fw_wg_allowed_ips }}
      PersistentKeepalive = 25
  when:
    - fw_wg_role == 'spoke'
    - not fw_is_black_site
  notify: restart wireguard

# ── Write wg0.conf — hub ──────────────────────────────────────────────────────

- name: "[WireGuard] Write wg0.conf (hub — peers added separately)"
  ansible.builtin.copy:
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
    content: |
      # ==========================================================================
      # /etc/wireguard/wg0.conf
      # Example Music Limited — {{ inventory_hostname }} ({{ fw_wg_role }})
      # Site: {{ fw_site_code }}
      # Generated by Ansible firewall role — {{ ansible_date_time.iso8601 }}
      # NOTE: Spoke [Peer] blocks are appended by the hub peer management playbook.
      # ==========================================================================

      [Interface]
      PrivateKey = {{ fw_wg_privkey }}
      Address    = {{ fw_wg_tunnel_ip }}/24
      ListenPort = {{ fw_wg_port }}

      PostUp   = nft add rule inet filter input iifname "wg0" accept
      PostUp   = nft add rule inet filter forward iifname "wg0" accept
      PostUp   = nft add rule inet filter forward oifname "wg0" accept
      PreDown  = nft flush chain inet filter input
      PreDown  = nft flush chain inet filter forward
  when:
    - fw_wg_role in ['hub-primary', 'hub-regional']
    - not fw_is_black_site
  notify: restart wireguard

# ── wg-quick network-online.target drop-in ────────────────────────────────────
# BUG FIX (2026-06-14): wg-quick@wg0.service ships with After=network.target
# which is satisfied before any interface has an IP. Endpoint resolution then
# fails at boot. Drop-in adds After=network-online.target to wait for NM to
# report a fully online interface before WireGuard starts.

- name: "[WireGuard] Create wg-quick@wg0 drop-in directory"
  ansible.builtin.file:
    path: /etc/systemd/system/wg-quick@wg0.service.d
    state: directory
    mode: '0755'
  when: fw_wg_role != 'none' and not fw_is_black_site

- name: "[WireGuard] Write network-online.target drop-in for wg-quick@wg0"
  ansible.builtin.copy:
    dest: /etc/systemd/system/wg-quick@wg0.service.d/wait-online.conf
    mode: '0644'
    content: |
      [Unit]
      After=network-online.target
      Wants=network-online.target
  when: fw_wg_role != 'none' and not fw_is_black_site

# ── Enable wg-quick ───────────────────────────────────────────────────────────

- name: "[WireGuard] Enable and start wg-quick@wg0"
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
    daemon_reload: true
  when:
    - fw_wg_role != 'none'
    - not fw_is_black_site

- name: "[WireGuard] Flush handlers"
  ansible.builtin.meta: flush_handlers

- name: "[WireGuard] Verify wg0 interface is up"
  ansible.builtin.shell: wg show wg0
  register: wg_show
  changed_when: false
  failed_when: false
  when:
    - fw_wg_role != 'none'
    - not fw_is_black_site

- name: "[WireGuard] Show wg status"
  ansible.builtin.debug:
    msg: "{{ wg_show.stdout_lines }}"
  when:
    - fw_wg_role != 'none'
    - not fw_is_black_site
    - wg_show.stdout_lines is defined
