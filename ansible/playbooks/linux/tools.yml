---
# linux/tools.yml
# Deploy common tools to all Linux hosts.
#   ansible-playbook playbooks/linux/tools.yml -i configs/inventory
#
# Changelog:
#   2026-07-02  Add /etc/example-music deploy for sites.csv and devices.csv

- name: Deploy common tools
  hosts: all
  become: true
  vars_files:
    - ../../group_vars/all/main.yml

  vars:
    # Source paths on the Ansible control node (relative to this playbook's directory).
    # Assumes standard repo layout: ansible/ and bootstrap/ sit under the same repo root.
    sites_csv_src:   "{{ playbook_dir }}/../../../bootstrap/web/proxmox/sites.csv"
    devices_csv_src: "{{ playbook_dir }}/../../files/devices.csv"

  tasks:

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: latest
        update_cache: true
        cache_valid_time: 3600

    - name: Set default shell to zsh for ansible user
      user:
        name: ansible
        shell: /bin/zsh

    - name: Ensure /etc/example-music exists
      ansible.builtin.file:
        path:  /etc/example-music
        state: directory
        owner: root
        group: root
        mode:  '0755'

    - name: Deploy sites.csv to /etc/example-music
      ansible.builtin.copy:
        src:   "{{ sites_csv_src }}"
        dest:  /etc/example-music/sites.csv
        owner: root
        group: root
        mode:  '0644'

    - name: Deploy devices.csv to /etc/example-music
      ansible.builtin.copy:
        src:   "{{ devices_csv_src }}"
        dest:  /etc/example-music/devices.csv
        owner: root
        group: root
        mode:  '0644'

