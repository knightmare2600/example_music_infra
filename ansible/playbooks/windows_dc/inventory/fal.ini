# =============================================================================
# inventory/fal.ini
# Example Music Limited — DC onboarding inventory (FAL site)
# =============================================================================
# This inventory is used for BOTH steps:
#
#   Step 1 — bootstrap (run from windows_bootstrap/):
#     ansible-playbook -i ../windows_dc/inventory/fal.ini \
#       ../windows_bootstrap/site.yml \
#       -e target=EXADCSFAL002 --ask-vault-pass
#
#   Step 2 — DC promotion (run from windows_dc/):
#     ansible-playbook -i inventory/fal.ini site.yml \
#       -e target=EXADCSFAL002 -e sites_csv=../../files/sites.csv
#
# Group hierarchy:
#   windows_dc → windows_server → windows → windows_nodes
# All group_vars and connection settings are inherited from that chain.
# No duplication needed here.
#
# Use the temporary DHCP IP in ansible_host for Step 1 (pre-rename).
# Update to the permanent IP after rename + domain join completes.
# =============================================================================

[windows_dc]
EXADCSFAL002  ansible_host=192.168.76.11

[windows_server:children]
windows_dc

[windows:children]
windows_server

[windows_nodes:children]
windows
