---
# =============================================================================
# tasks/preflight.yml
# Example Music Limited — Bootstrap preflight checks (Stage 0b)
# Replicates Join-DomainAndBootstrap.ps1 Stage 0b
# =============================================================================
# Changelog:
#   2026-06-20  Initial file
#   2026-06-29  Derive host_subnet_octet from IP directly — do not rely on
#               site_detection.yml which runs after this task file
#   2026-06-29  Switch jukebox.internal DNS check from FAIL to WARN — this
#               will not resolve on a host that is not yet domain-joined,
#               which is expected and not an error
#   2026-06-29  Add first-DC prompt — if primary DC is unreachable, ask the
#               operator to confirm whether this IS the first DC being
#               built (skips the DC-reachability hard fail and defers
#               domain creation to the windows_dc module, avoiding a
#               chicken-and-egg with Stage 5 domain join in this playbook)
# =============================================================================

- name: "[Preflight] Gather facts"
  ansible.windows.setup:

- name: "[Preflight] Detect OS product type (1=Workstation 2=DC 3=Server)"
  ansible.windows.win_shell: |
    (Get-WmiObject Win32_OperatingSystem).ProductType
  register: preflight_product_type
  changed_when: false

- name: "[Preflight] Set OS type facts"
  set_fact:
    is_server:      "{{ preflight_product_type.stdout | trim in ['2', '3'] }}"
    is_workstation: "{{ preflight_product_type.stdout | trim == '1' }}"
    product_type:   "{{ preflight_product_type.stdout | trim }}"

- name: "[Preflight] Detect chassis type"
  ansible.windows.win_shell: |
    (Get-WmiObject Win32_SystemEnclosure).ChassisTypes[0]
  register: preflight_chassis
  changed_when: false

- name: "[Preflight] Set chassis facts"
  set_fact:
    is_laptop: >-
      {{ preflight_chassis.stdout | trim in ['9','10','14','30','31','32'] }}

- name: "[Preflight] Derive subnet octet from current IP"
  ansible.windows.win_shell: |
    (Get-NetIPAddress -AddressFamily IPv4 |
      Where-Object { $_.IPAddress -notmatch '^(127\.|169\.)' } |
      Select-Object -First 1).IPAddress.Split('.')[2]
  register: subnet_octet_raw
  changed_when: false

- name: "[Preflight] Set host_subnet_octet fact"
  set_fact:
    host_subnet_octet: "{{ subnet_octet_raw.stdout | trim }}"

# =============================================================================
# Primary DC reachability — first-DC handling
# =============================================================================

- name: "[Preflight] Check primary DC reachable"
  ansible.windows.win_shell: |
    $dc = "192.168.{{ host_subnet_octet }}.10"
    if (Test-Connection -ComputerName $dc -Count 1 -Quiet) { "ok" } else { "fail" }
  register: preflight_dc
  changed_when: false

#- name: "[Preflight] Prompt — confirm first-DC build (primary DC unreachable)"
#  pause:
#    prompt: |
#
#      ── Primary DC Unreachable ───────────────────────────────────────────
#      192.168.{{ host_subnet_octet }}.10 did not respond.
#
#      This is expected if {{ inventory_hostname }} ({{ target_hostname | default(ansible_hostname) | default('this host') }})
#      is the FIRST domain controller being built — there is nothing to
#      reach yet.
#
#      If this IS the first DC:
#        Domain creation (Install-ADDSForest) is handled separately by the
#        windows_dc module, NOT by this bootstrap playbook. This playbook
#        will skip Stage 5 domain join and leave the host as a standalone
#        server ready for windows_dc/site.yml to take over.
#
#      If this is NOT the first DC:
#        Check networking/firewall/DNS before proceeding — domain join
#        will fail without a reachable DC.
#
#      Is this the FIRST domain controller being built? (yes/no)
#  register: first_dc_prompt
#  when: preflight_dc.stdout | trim == "fail"

- name: "[Preflight] Set is_first_dc fact"
  set_fact:
    is_first_dc: >-
      {{ (preflight_dc.stdout | trim == 'fail')
        and (is_first_dc_input | trim | lower in ['y', 'yes'])
      }}

- name: "[Preflight] FAIL — Primary DC unreachable and NOT confirmed as first DC"
  fail:
    msg: >
      Primary DC 192.168.{{ host_subnet_octet }}.10 is unreachable and this
      was not confirmed as the first DC build. Domain join will fail.
      Check networking before proceeding, or re-run and confirm 'yes' if
      this genuinely is the first DC for this site/forest.
  when:
    - preflight_dc.stdout | trim == "fail"
    - not is_first_dc | bool

- name: "[Preflight] NOTE — proceeding as first-DC build, domain join will be skipped"
  debug:
    msg: >
      NOTE: Confirmed as first-DC build. Stage 5 (domain join) in this
      playbook will be skipped. Run windows_dc/site.yml after this
      bootstrap completes to create the forest/domain.
  when: is_first_dc | bool

# =============================================================================
# DNS — warning only, not a hard fail
# =============================================================================

- name: "[Preflight] Check jukebox.internal DNS resolves"
  ansible.windows.win_shell: |
    try {
      [System.Net.Dns]::GetHostAddresses("jukebox.internal") | Out-Null
      "ok"
    } catch { "fail" }
  register: preflight_dns
  changed_when: false

- name: "[Preflight] WARN — jukebox.internal does not resolve (expected pre-domain-join)"
  debug:
    msg: >
      WARN: jukebox.internal does not resolve on {{ inventory_hostname }}.
      This is expected if the host is not yet domain-joined, or if this is
      the first DC build (domain does not exist yet).
      If this host SHOULD already be able to resolve it, check DNS
      configuration before proceeding.
  when: preflight_dns.stdout | trim == "fail"

- name: "[Preflight] Set dns_resolves fact"
  set_fact:
    dns_resolves: "{{ preflight_dns.stdout | trim == 'ok' }}"

# =============================================================================
# Asset / package source reachability checks (unchanged — warnings only)
# =============================================================================

- name: "[Preflight] Check wallpaper URL reachable"
  ansible.windows.win_shell: |
    try {
      $r = Invoke-WebRequest -Uri "{{ exa_wallpaper_url }}" -Method Head -UseBasicParsing -TimeoutSec 5
      "ok"
    } catch { "warn" }
  register: preflight_wallpaper
  changed_when: false

- name: "[Preflight] WARN — wallpaper URL unreachable (wallpaper stage will be skipped)"
  debug:
    msg: "WARN: {{ exa_wallpaper_url }} unreachable — wallpaper stage will be skipped."
  when: preflight_wallpaper.stdout | trim == "warn"

- name: "[Preflight] Set wallpaper available fact"
  set_fact:
    wallpaper_available: "{{ preflight_wallpaper.stdout | trim == 'ok' }}"

- name: "[Preflight] Check chocolatey.org reachable"
  ansible.windows.win_shell: |
    try {
      Invoke-WebRequest -Uri "https://community.chocolatey.org" -Method Head -UseBasicParsing -TimeoutSec 5 | Out-Null
      "ok"
    } catch { "warn" }
  register: preflight_choco
  changed_when: false

- name: "[Preflight] WARN — chocolatey.org unreachable (package installs will fail)"
  debug:
    msg: "WARN: community.chocolatey.org unreachable — package installation stages will fail."
  when: preflight_choco.stdout | trim == "warn"

- name: "[Preflight] Check GitHub reachable (font download)"
  ansible.windows.win_shell: |
    try {
      Invoke-WebRequest -Uri "https://github.com" -Method Head -UseBasicParsing -TimeoutSec 5 | Out-Null
      "ok"
    } catch { "warn" }
  register: preflight_github
  changed_when: false

- name: "[Preflight] WARN — GitHub unreachable (font download may fall back to asset server)"
  debug:
    msg: "WARN: github.com unreachable — font stage will use asset server only."
  when: preflight_github.stdout | trim == "warn"

# =============================================================================
# Domain join status
# =============================================================================

- name: "[Preflight] Check not already domain-joined"
  ansible.windows.win_shell: |
    (Get-WmiObject Win32_ComputerSystem).PartOfDomain
  register: preflight_domain
  changed_when: false

- name: "[Preflight] NOTE — host is already domain-joined (domain join stage will skip)"
  debug:
    msg: "NOTE: {{ inventory_hostname }} is already domain-joined — Stage 5 will skip."
  when: preflight_domain.stdout | trim | lower == "true"

- name: "[Preflight] Set domain joined fact"
  set_fact:
    already_domain_joined: "{{ preflight_domain.stdout | trim | lower == 'true' }}"

# =============================================================================
# Summary
# =============================================================================

- name: "[Preflight] Summary"
  debug:
    msg:
      - "OS product type : {{ product_type }} ({{ 'Server/DC' if is_server else 'Workstation' }})"
      - "Chassis         : {{ preflight_chassis.stdout | trim }} ({{ 'Laptop/Tablet' if is_laptop else 'Desktop/Server' }})"
      - "Subnet octet    : {{ host_subnet_octet }}"
      - "Primary DC      : 192.168.{{ host_subnet_octet }}.10 {{ '[OK]' if preflight_dc.stdout | trim == 'ok' else ('[FIRST DC BUILD]' if is_first_dc | bool else '[UNREACHABLE]') }}"
      - "DNS jukebox     : {{ '[OK]' if dns_resolves | bool else '[WARN — not yet resolvable]' }}"
      - "Wallpaper URL   : {{ '[OK]' if wallpaper_available else '[WARN — will skip]' }}"
      - "Chocolatey.org  : {{ '[OK]' if preflight_choco.stdout | trim == 'ok' else '[WARN]' }}"
      - "Domain joined   : {{ 'YES — join stage will skip' if already_domain_joined else 'No' }}"
      - "First DC build  : {{ 'YES — Stage 5 domain join will skip, run windows_dc/site.yml after' if is_first_dc | bool else 'No' }}"

