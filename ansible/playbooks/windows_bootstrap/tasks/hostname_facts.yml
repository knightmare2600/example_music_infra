---
# =============================================================================
# tasks/hostname_facts.yml
# Example Music Limited — Parse EXA[ROLE][SITE][NNN] hostname convention
# Sets: host_role (e.g. WKS), host_site (e.g. GLA), host_num (e.g. 001)
# =============================================================================
# Changelog:
#   2026-06-20  Initial file
# =============================================================================

- name: Parse role from hostname
  set_fact:
    host_role: "{{ inventory_hostname | upper | regex_search('^EXA([A-Z]{2,4})[A-Z]{3}[0-9]{3}$', '\\1') | first | default('UNKNOWN') }}"
    host_site: "{{ inventory_hostname | upper | regex_search('^EXA[A-Z]{2,4}([A-Z]{3})[0-9]{3}$', '\\1') | first | default('UNKNOWN') }}"
    host_num:  "{{ inventory_hostname | upper | regex_search('^EXA[A-Z]{2,4}[A-Z]{3}([0-9]{3})$', '\\1') | first | default('001') }}"

- name: Validate hostname convention
  assert:
    that:
      - host_role != 'UNKNOWN'
      - host_site != 'UNKNOWN'
    fail_msg: >
      Hostname '{{ inventory_hostname }}' does not match EXA[ROLE][SITE][NNN] convention.
      Examples: EXAWKSGLA001, EXASRVCLD002, EXALAPCPH003.
    success_msg: "Hostname valid: role={{ host_role }} site={{ host_site }} num={{ host_num }}"

- name: Debug — hostname facts
  debug:
    msg: "role={{ host_role }}  site={{ host_site }}  num={{ host_num }}"
  tags: [never, debug]
