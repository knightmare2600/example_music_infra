---
# =============================================================================
# site.yml
# Example Music Limited — Windows host entry point
# =============================================================================
# Bootstrap runs first (once, on a fresh PXE build).
# Subsequent runs skip stages that are already complete (idempotent).
#
# Run from the ansible/ root for all commands.
#
# Usage — bootstrap a fresh host (default, no --tags needed):
#   ansible-playbook playbooks/windows_bootstrap/site.yml \
#     -i <ip>, -e target_hosts=<ip>
#
# Usage — run a standalone management play (opt-in, tagged [never, <name>]):
#   ansible-playbook playbooks/windows_bootstrap/site.yml \
#     -i configs/inventory -e target_hosts=<host> --tags rename
#   ansible-playbook playbooks/windows_bootstrap/site.yml \
#     -i configs/inventory -e target_hosts=<host> --tags registry
#   ansible-playbook playbooks/windows_bootstrap/site.yml \
#     -i configs/inventory -e target_hosts=<host> --tags openssh
#   (etc. — see playbook order below for all tag names)
#
# Standalone plays can also be run directly without site.yml:
#   ansible-playbook playbooks/windows_bootstrap/playbooks/20-registry.yml \
#     -i configs/inventory
#
# Playbook order:
#   00-bootstrap    Full PostOOBE bootstrap (replaces Join-DomainAndBootstrap.ps1)
#   10-rename       Rename (standalone — also runs inside bootstrap)
#   20-registry     Registry hardening
#   25-deadvertise  Advertising/telemetry suppression (desktop + laptop only)
#   30-chocolatey   Chocolatey installation
#   40-choco-pkgs   Chocolatey packages
#   50-binaries     Arch-aware binary + font deployment
#   60-wallpaper    Corporate wallpaper
#   70-hibernation  Hibernation policy by host type
#   75-openssh      OpenSSH + Ansible key (standalone — also runs inside bootstrap)
#   80-domainjoin   Domain join (standalone — also runs inside bootstrap)
# =============================================================================
# Changelog:
#   2026-06-20  Initial file
#   2026-06-20  Bootstrap added as entry point replacing Join-DomainAndBootstrap.ps1
#   2026-07-02  Standalone management plays tagged [never, <name>] so a bare
#               site.yml run only executes the bootstrap sequence. Each
#               standalone play must be invoked with --tags <name> explicitly.
# =============================================================================

# Bootstrap sequence — runs by default (preflight chain-imports 05-bootstrap.yml)
- import_playbook: playbooks/00-preflight.yml
  tags: bootstrap

# Standalone management plays — opt-in only via --tags <name>
# These MUST NOT run automatically after bootstrap: the machine may be
# mid-reboot, and each has its own vars_prompt that fires mid-run.

- import_playbook: playbooks/10-rename.yml
  tags: [never, rename]

- import_playbook: playbooks/20-registry.yml
  tags: [never, registry]

- import_playbook: playbooks/25-deadvertise.yml
  tags: [never, deadvertise]

- import_playbook: playbooks/30-chocolatey.yml
  tags: [never, chocolatey]

- import_playbook: playbooks/40-choco-packages.yml
  tags: [never, choco_packages]

- import_playbook: playbooks/50-binaries.yml
  tags: [never, binaries]

- import_playbook: playbooks/60-wallpaper.yml
  tags: [never, wallpaper]

- import_playbook: playbooks/70-hibernation.yml
  tags: [never, hibernation]

- import_playbook: playbooks/75-openssh.yml
  tags: [never, openssh]

- import_playbook: playbooks/80-domainjoin.yml
  tags: [never, domainjoin]
