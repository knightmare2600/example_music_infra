---
# =============================================================================
# playbooks/windows_bootstrap/playbooks/00-preflight.yml
# Example Music Limited — Pre-flight: credentials, hostname, IP, SSH hardening
#
# Runs against a freshly built Windows host on its DHCP address.
# Handles everything that must happen BEFORE 05-bootstrap.yml:
#
#   1. Verify SSH is running and set to auto-start
#   2. Deploy Ansible public key (so subsequent runs are passwordless)
#   3. Prompt for target hostname — validates EXA[ROLE][SITE][NNN] format
#   4. Derive site details from sites.csv on the Ansible control node
#   5. List NICs, prompt user to select one
#   6. Prompt for DHCP or static IP — SKIPPED if IP already matches sites.csv
#   7. Rename computer — SKIPPED if hostname already correct
#   8. Single reboot — rename takes effect AND static IP scheduled task fires
#   9. wait_for_connection on new IP
#  10. Hand off to 05-bootstrap.yml
#
# Usage:
#   ansible-playbook playbooks/windows_bootstrap/playbooks/00-preflight.yml \
#     -i 192.168.151.174, -e "target_hosts=192.168.151.174"
#
# Changelog:
#   2026-06-27  Initial file
#   2026-06-27  Combined rename and static IP into single reboot
#   2026-06-29  Guard reboot/scheduled task if IP already correct
#   2026-06-29  Fix reconnect — wait_for on control node, then wait_for_connection
#   2026-06-29  Fix heredoc to use single-quote @'...'@ to avoid YAML parse issues
#   2026-06-29  Skip IP prompt if current IP already matches sites.csv expectation
#   2026-06-29  Skip rename prompt if hostname already matches target
# =============================================================================

- name: Pre-flight — credentials, hostname, IP, SSH
  hosts: "{{ target_hosts }}"
  gather_facts: false

  vars_prompt:
    - name: ansible_user
      prompt: "Username to connect as"
      private: false
      default: "Administrator"

    - name: ansible_password
      prompt: "Local Administrator password (blank if SSH key already deployed)"
      private: true
      default: ""

    - name: target_hostname
      prompt: "Target hostname (e.g. EXADCSLIV001)"
      private: false
      default: ""

  vars:
    ansible_become:               false
    ansible_become_method:        runas
    ansible_connection:           ssh
    ansible_shell_type:           powershell
    ansible_ssh_extra_args:       '-o StrictHostKeyChecking=no'
    ansible_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/ansible/configs/ansible-id_rsa"
    ansible_ssh_public_key_file:  "{{ lookup('env', 'HOME') }}/ansible/configs/ansible-id_rsa.pub"
    sites_csv:                    "/etc/example-music/sites.csv"
    dns_server:                   "192.168.139.8"

  tasks:

    # =========================================================================
    # STEP 1 — Validate hostname before touching anything
    # =========================================================================

    - name: Validate hostname format
      assert:
        that:
          - target_hostname | length > 0
          - target_hostname | upper | regex_search('^EXA[A-Z]{2,4}[A-Z]{3}[0-9]{3}$') is not none
        fail_msg: >
          '{{ target_hostname }}' is not a valid EXA hostname.
          Format: EXA[ROLE][SITE][NNN] — e.g. EXADCSLIV001, EXAWKSFAL001.

    - name: Parse site and role codes from hostname
      set_fact:
        host_site_code: "{{ target_hostname | upper | regex_search('^EXA[A-Z]{2,4}([A-Z]{3})[0-9]{3}$', '\\1') | first }}"
        host_role_code: "{{ target_hostname | upper | regex_search('^EXA([A-Z]{2,4})[A-Z]{3}[0-9]{3}$', '\\1') | first }}"

    # =========================================================================
    # STEP 2 — Read sites.csv on control node, derive network details
    # =========================================================================

    - name: Read sites.csv from control node
      set_fact:
        site_data: "{{ lookup('file', sites_csv) | community.general.from_csv }}"
      delegate_to: localhost

    - name: Find site record for {{ host_site_code }}
      set_fact:
        site_record: "{{ site_data | selectattr('Site', 'equalto', host_site_code) | list | first | default({}) }}"

    - name: Fail if site code not found in sites.csv
      fail:
        msg: "Site code '{{ host_site_code }}' not found in {{ sites_csv }}. Check the hostname."
      when: site_record | length == 0

    - name: Derive network defaults from sites.csv
      set_fact:
        site_subnet:       "{{ site_record.Subnet }}"
        site_gateway:      "{{ site_record.Gateway }}"
        site_dc:           "{{ site_record.DC }}"
        site_city:         "{{ site_record.City }}"
        site_country:      "{{ site_record.Country }}"
        subnet_base:       "{{ site_record.Subnet | regex_replace('/\\d+$', '') | regex_replace('\\.\\d+$', '') }}"
        prefix_len:        "{{ site_record.Subnet.split('/')[1] }}"
        site_expected_ip:  "{{ site_record.DC }}"

    - name: Show derived site info
      debug:
        msg:
          - "════════════════════════════════════════════════════════"
          - "  Hostname : {{ target_hostname | upper }}"
          - "  Site     : {{ host_site_code }} — {{ site_city }}, {{ site_country }}"
          - "  Subnet   : {{ site_subnet }}"
          - "  Gateway  : {{ site_gateway }}"
          - "  DC       : {{ site_dc }}"
          - "  DNS      : {{ dns_server }}"
          - "════════════════════════════════════════════════════════"

    # =========================================================================
    # STEP 3 — Connect and verify SSH is healthy
    # =========================================================================

    - name: Gather facts
      ansible.windows.setup:

    - name: Ensure sshd is running and set to auto-start
      ansible.windows.win_service:
        name: sshd
        start_mode: auto
        state: started

    - name: Ensure OpenSSH firewall rule exists
      community.windows.win_firewall_rule:
        name:      OpenSSH-Server-In-TCP
        localport: "22"
        action:    allow
        direction: in
        protocol:  tcp
        state:     present
        enabled:   true

    # =========================================================================
    # STEP 4 — Deploy Ansible public key (passwordless from here on)
    # =========================================================================

    - name: Create ProgramData\ssh directory
      ansible.windows.win_file:
        path: 'C:\ProgramData\ssh'
        state: directory

    - name: Deploy Ansible public key to administrators_authorized_keys
      ansible.windows.win_copy:
        content: "{{ lookup('file', ansible_ssh_public_key_file) }}\n"
        dest:    'C:\ProgramData\ssh\administrators_authorized_keys'

    - name: Lock down administrators_authorized_keys permissions
      ansible.windows.win_shell: |
        icacls C:\ProgramData\ssh\administrators_authorized_keys /inheritance:r
        icacls C:\ProgramData\ssh\administrators_authorized_keys /grant "SYSTEM:(F)"
        icacls C:\ProgramData\ssh\administrators_authorized_keys /grant "BUILTIN\Administrators:(F)"
      changed_when: false

    # =========================================================================
    # STEP 5 — Check current hostname and IP against expected values
    # =========================================================================

    - name: Get current hostname
      ansible.windows.win_shell: $env:COMPUTERNAME
      register: current_hostname_raw
      changed_when: false

    - name: Set current hostname fact
      set_fact:
        current_hostname: "{{ current_hostname_raw.stdout | trim | upper }}"

    - name: Get current IP on primary NIC
      ansible.windows.win_shell: |
        (Get-NetIPAddress -AddressFamily IPv4 |
          Where-Object { $_.IPAddress -notmatch '^(127\.|169\.)' } |
          Sort-Object -Property PrefixLength -Descending |
          Select-Object -First 1).IPAddress
      register: current_ip_raw
      changed_when: false

    - name: Set current IP fact
      set_fact:
        current_ip: "{{ current_ip_raw.stdout | trim }}"

    - name: Set change-needed facts
      set_fact:
        hostname_needs_change: "{{ current_hostname != target_hostname | upper }}"
        ip_needs_change: "{{ not (current_ip.startswith(subnet_base + '.')) }}"

    - name: Show current state
      debug:
        msg:
          - "  Current hostname : {{ current_hostname }} → target: {{ target_hostname | upper }} ({{ 'CHANGE NEEDED' if hostname_needs_change else 'OK' }})"
          - "  Current IP       : {{ current_ip }} → subnet: {{ site_subnet }} ({{ 'CHANGE NEEDED' if ip_needs_change else 'OK' }})"

    # =========================================================================
    # STEP 6 — NIC selection (only if IP needs changing)
    # =========================================================================

    - name: List available NICs
      ansible.windows.win_shell: |
        $nics = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' -and $_.Name -notmatch 'Loopback' }
        $i = 1
        foreach ($n in $nics) {
          $ip = (Get-NetIPAddress -InterfaceIndex $n.ifIndex -AddressFamily IPv4 `
                 -ErrorAction SilentlyContinue).IPAddress
          Write-Output "$i`t$($n.Name)`t$($n.InterfaceDescription)`t$($ip -join ',')"
          $i++
        }
      register: nic_list
      changed_when: false
      when: ip_needs_change | bool

    - name: Show available NICs
      debug:
        msg: "{{ nic_list.stdout_lines }}"
      when: ip_needs_change | bool

    - name: Prompt — select NIC
      ansible.builtin.pause:
        prompt: |

          ── NIC Selection ────────────────────────────────────────────────────
          NICs listed above (number / name / description / current IP).
          Enter the NUMBER of the NIC to configure.
          (If only one NIC listed, enter 1)
      register: nic_choice
      when: ip_needs_change | bool

    - name: Get selected NIC name
      ansible.windows.win_shell: |
        $nics = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' -and $_.Name -notmatch 'Loopback' }
        $selected = @($nics)[{{ nic_choice.user_input | trim | int - 1 }}]
        Write-Output $selected.Name
      register: selected_nic
      changed_when: false
      when: ip_needs_change | bool

    - name: Set selected NIC fact
      set_fact:
        target_nic: "{{ selected_nic.stdout | trim }}"
      when: ip_needs_change | bool

    # =========================================================================
    # STEP 7 — IP configuration (only if IP needs changing)
    # =========================================================================

    - name: Prompt — static IP to assign
      ansible.builtin.pause:
        prompt: |

          ── IP Configuration for {{ target_nic }} ────────────────────────────
          Site    : {{ host_site_code }} — {{ site_city }}
          Subnet  : {{ site_subnet }}
          Gateway : {{ site_gateway }}
          DNS     : {{ dns_server }}

          Enter a static IP (e.g. {{ subnet_base }}.10)
          Servers/DCs typically use .10 (primary) or .11 (secondary).
      register: ip_choice
      when: ip_needs_change | bool

    - name: Set static IP facts
      set_fact:
        use_dhcp:  false
        static_ip: "{{ ip_choice.user_input | trim }}"
      when: ip_needs_change | bool

    - name: Set no-change IP facts (IP already correct)
      set_fact:
        use_dhcp:  false
        static_ip: "{{ current_ip }}"
      when: not ip_needs_change | bool

    - name: Prompt — confirm static IP details
      ansible.builtin.pause:
        prompt: |

          ── Confirm Static IP ────────────────────────────────────────────────
          NIC     : {{ target_nic }}
          IP      : {{ static_ip }}/{{ prefix_len }}
          Gateway : {{ site_gateway }}
          DNS 1   : {{ dns_server }}
          DNS 2   : {{ site_dc }}

          Press Enter to confirm, Ctrl+C then A to abort.
      when: ip_needs_change | bool

    # =========================================================================
    # STEP 8 — Write scheduled task (only if IP needs changing)
    # =========================================================================

    - name: Write scheduled task — apply static IP on next boot
      ansible.windows.win_shell: |
        $script = @'
        netsh interface ip set address name='{{ target_nic }}' static {{ static_ip }} {{ '255.255.255.0' if prefix_len == '24' else '255.255.0.0' }} {{ site_gateway }}
        netsh interface ip set dns    name='{{ target_nic }}' static {{ dns_server }}
        netsh interface ip add dns    name='{{ target_nic }}' {{ site_dc }} index=2
        netsh advfirewall firewall set rule name="OpenSSH-Server-In-TCP" new enable=yes
        netsh advfirewall firewall set rule group="OpenSSH Server" new enable=yes
        Restart-Service sshd
        Unregister-ScheduledTask -TaskName 'EXA-ApplyStaticIP' -Confirm:$false
        '@
        $encoded = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($script))
        $action    = New-ScheduledTaskAction -Execute "powershell.exe" `
                       -Argument "-NoProfile -NonInteractive -EncodedCommand $encoded"
        $trigger   = New-ScheduledTaskTrigger -AtStartup
        $settings  = New-ScheduledTaskSettingsSet -ExecutionTimeLimit (New-TimeSpan -Minutes 5)
        $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -RunLevel Highest
        Register-ScheduledTask -TaskName "EXA-ApplyStaticIP" `
          -Action $action -Trigger $trigger -Settings $settings `
          -Principal $principal -Force
      changed_when: true
      when: ip_needs_change | bool

    # =========================================================================
    # STEP 9 — Rename computer (only if hostname needs changing)
    # =========================================================================

    - name: Rename computer to {{ target_hostname | upper }}
      ansible.windows.win_hostname:
        name: "{{ target_hostname | upper }}"
      register: rename_result
      when: hostname_needs_change | bool

    # =========================================================================
    # STEP 10 — Reboot if rename or IP change needed
    # =========================================================================

    - name: Set needs_reboot fact
      set_fact:
        needs_reboot: >-
          {{ hostname_needs_change | bool
             or ip_needs_change | bool }}

    - name: Warn operator — reboot imminent
      debug:
        msg: >-
          ════════════════════════════════════════════════════════════════
          Rebooting now to apply changes.
          {% if ip_needs_change | bool %}
          !! IP CHANGE — Ansible will reconnect on {{ static_ip }} !!
          DO NOT press Ctrl+C — reconnect takes up to 5 minutes.
          {% else %}
          IP unchanged — reconnecting on {{ current_ip }}
          {% endif %}
          ════════════════════════════════════════════════════════════════
      when: needs_reboot | bool

    - name: Reboot — applies rename and static IP in one pass
      ansible.windows.win_shell: shutdown /r /t 5 /f
      when: needs_reboot | bool

    - name: Switch ansible_host to new static IP for remainder of play
      set_fact:
        ansible_host: "{{ static_ip }}"
      when: ip_needs_change | bool

    - name: Wait for SSH on new IP (control node poll)
      ansible.builtin.wait_for:
        host:    "{{ static_ip if ip_needs_change | bool else current_ip }}"
        port:    22
        state:   started
        timeout: 300
        delay:   30
      delegate_to: localhost
      when: needs_reboot | bool

    - name: Re-establish Ansible connection
      ansible.builtin.wait_for_connection:
        timeout: 120
        delay:   10
      when: needs_reboot | bool

    # =========================================================================
    # STEP 11 — Summary before handing off
    # =========================================================================

    - name: Pre-flight complete — summary
      debug:
        msg:
          - "════════════════════════════════════════════════════════════════"
          - "  Pre-flight complete"
          - "  Hostname : {{ target_hostname | upper }}"
          - "  Site     : {{ host_site_code }} — {{ site_city }}, {{ site_country }}"
          - "  IP       : {{ static_ip }}"
          - "  SSH      : running, auto-start, Ansible key deployed"
          - "  Handing off to 05-bootstrap.yml..."
          - "════════════════════════════════════════════════════════════════"

- import_playbook: 05-bootstrap.yml

