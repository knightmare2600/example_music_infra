---
# =============================================================================
# group_vars/all/vars.yml
# Example Music Limited — Variables common to all managed hosts
# =============================================================================
# Changelog:
#   2026-06-20  Initial file
# =============================================================================

# Binary / asset server
exa_asset_base:      "http://192.168.139.50/WINDOWS"
exa_wallpaper_url:   "http://192.168.139.50/ExampleMusicWallpaper.png"
exa_wallpaper_dest:  'C:\Windows\Web\Wallpaper\ExampleMusic\corporate.png'

# Domain
exa_domain:          "jukebox.internal"
exa_domain_join_user: "JUKEBOX\\Administrator"

# Chocolatey
exa_choco_source:    "https://community.chocolatey.org/api/v2/"

# Screen lock timeout (seconds)
exa_lock_timeout_secs: 3600

# SSH / Ansible
exa_ansible_pub_key: "ssh-rsa  knightmare@ansible"
exa_ansible_key_path: 'C:\ProgramData\ssh\administrators_authorized_keys'

# Fonts
exa_font_files:
  - JetBrainsMonoNerdFont-Regular.ttf
  - JetBrainsMonoNerdFont-Bold.ttf
  - JetBrainsMonoNerdFont-BoldItalic.ttf
  - JetBrainsMonoNerdFont-Italic.ttf
  - JetBrainsMonoNerdFontMono-Regular.ttf
