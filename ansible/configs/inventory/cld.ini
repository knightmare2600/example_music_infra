# =============================================================================
# inventory/cld.ini
# Example Music Limited — CLD site inventory (example)
# =============================================================================
# Groups:
#   windows          — all Windows hosts (picks up group_vars/windows/)
#   windows_server   — SRV/DCS hosts     (picks up group_vars/windows_server/)
#   windows_desktop  — WKS hosts         (picks up group_vars/windows_desktop/)
#   windows_laptop   — LAP/SUR hosts     (picks up group_vars/windows_laptop/)
#
# SSH connection is the default (set in group_vars/windows/vars.yml).
# Override per-host with ansible_connection=winrm if SSH is unavailable.
# =============================================================================
# Changelog:
#   2026-06-20  Initial file — CLD example
# =============================================================================

# ── Servers ───────────────────────────────────────────────────────────────────
[windows_server]
EXAANSCLD001  ansible_host=192.168.139.9

# ── Desktops ──────────────────────────────────────────────────────────────────
[windows_desktop]
EXAWKSCLD001  ansible_host=192.168.139.101   # DHCP — update if lease changes

# ── Laptops / tablets ─────────────────────────────────────────────────────────
[windows_laptop]
# EXALAPCLD001  ansible_host=192.168.139.102

# ── Group of groups — all Windows hosts inherit group_vars/windows/ ───────────
[windows:children]
windows_server
windows_desktop
windows_laptop

[firewalls]
EXAFWLCLD001  ansible_host=192.168.139.1  ansible_user=ansible ansible_connection=ssh
