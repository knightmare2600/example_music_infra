# =============================================================================
# configs/inventory/liv.ini
# Example Music Limited — DC onboarding inventory (LIV site)
# =============================================================================
# This inventory is used for BOTH steps (run from ansible/ root):
#
#   Step 1 — bootstrap:
#     ansible-playbook -i configs/inventory \
#       playbooks/windows_bootstrap/site.yml \
#       -e target=EXADCSLIV001 --ask-vault-pass
#
#   Step 2 — DC promotion:
#     ansible-playbook -i configs/inventory \
#       playbooks/windows_dc/site.yml \
#       -e target=EXADCSLIV001
#
# Group hierarchy:
#   windows_dc → windows_server → windows → windows_nodes
# All group_vars and connection settings are inherited from that chain.
#
# Use the temporary DHCP IP in ansible_host for Step 1 (pre-rename).
# Update to the permanent IP after rename + domain join completes.
# =============================================================================

[windows_dc]
EXADCSLIV001  ansible_host=192.168.151.10

[windows_server:children]
windows_dc

[windows:children]
windows_server

[windows_nodes:children]
windows
