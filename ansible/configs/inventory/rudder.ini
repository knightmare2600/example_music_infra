# =============================================================================
# configs/inventory/rudder.ini
# Example Music Limited — Rudder server and relay inventory
# =============================================================================

# --- Rudder server(s) --------------------------------------------------------
# The root Rudder server. Currently one node; the playbook supports multiple
# if you ever run a second root server (unlikely — Rudder is single-root).
[rudder_servers]
192.168.139.12   # EXASRVFAL004 — FAL cloud-hosted Rudder server (CLD)

# --- Rudder relays -----------------------------------------------------------
# Hub relay nodes. Each relay serves agents at its regional sites.
# Install with: ansible-playbook playbooks/rudder/rudder_relay.yml
[rudder_relays]
# 192.168.76.12   # EXASRVODE004 — ODE EU relay (future)
# 192.168.126.12  # EXASRVODE004 — ODE EU relay (future)
# 192.168.136.12  # EXASRVBRK004 — BRK NA relay (future)

# --- Rudder meta-group -------------------------------------------------------
[rudder:children]
rudder_servers
rudder_relays
